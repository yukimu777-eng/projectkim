<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo アプリ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 32px;
      width: 100%;
      max-width: 580px;
    }

    h1 {
      font-size: 1.6rem;
      margin: 0 0 20px;
      color: #1a1a2e;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .input-row input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      font-size: 1rem;
      border: 2px solid #ddd;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input[type="text"]:focus {
      border-color: #4f8ef7;
    }

    .input-row input[type="date"] {
      padding: 10px 10px;
      font-size: 0.9rem;
      border: 2px solid #ddd;
      border-radius: 8px;
      outline: none;
      color: #555;
      transition: border-color 0.2s;
    }

    .input-row input[type="date"]:focus {
      border-color: #4f8ef7;
    }

    .input-row button {
      padding: 10px 18px;
      font-size: 1rem;
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #3a7ae8;
    }

    .stats-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      min-height: 24px;
    }

    .stats {
      font-size: 0.85rem;
      color: #888;
    }

    .stats span {
      color: #4f8ef7;
      font-weight: bold;
    }

    .clear-btn {
      padding: 4px 12px;
      font-size: 0.8rem;
      background: #fff;
      color: #e74c3c;
      border: 1.5px solid #e74c3c;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-btn:hover {
      background: #e74c3c;
      color: #fff;
    }

    .filter-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filter-row button {
      padding: 6px 16px;
      font-size: 0.9rem;
      border: 2px solid #ddd;
      border-radius: 20px;
      background: #fff;
      cursor: pointer;
      transition: all 0.2s;
      color: #555;
    }

    .filter-row button.active {
      background: #4f8ef7;
      border-color: #4f8ef7;
      color: #fff;
    }

    .filter-row button:hover:not(.active) {
      border-color: #4f8ef7;
      color: #4f8ef7;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 8px;
      border-bottom: 1px solid #f0f0f0;
      border-radius: 6px;
      cursor: grab;
      transition: background 0.15s, opacity 0.2s;
    }

    li:hover {
      background: #f8f9ff;
    }

    li.dragging {
      opacity: 0.4;
      cursor: grabbing;
    }

    li.drag-over {
      background: #e8f0fe;
      border-top: 2px solid #4f8ef7;
    }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #4f8ef7;
      flex-shrink: 0;
    }

    .todo-body {
      flex: 1;
      min-width: 0;
    }

    .todo-text {
      font-size: 1rem;
      color: #333;
      cursor: text;
      padding: 2px 4px;
      border-radius: 4px;
      transition: background 0.15s;
      display: inline-block;
      max-width: 100%;
    }

    .todo-text:hover {
      background: #f0f4ff;
    }

    li.done .todo-text {
      text-decoration: line-through;
      color: #aaa;
    }

    .todo-edit-input {
      font-size: 1rem;
      padding: 2px 6px;
      border: 2px solid #4f8ef7;
      border-radius: 4px;
      outline: none;
      width: 100%;
    }

    .due-date {
      font-size: 0.75rem;
      margin-top: 2px;
    }

    .due-date.overdue { color: #e74c3c; font-weight: bold; }
    .due-date.soon    { color: #f39c12; font-weight: bold; }
    .due-date.ok      { color: #27ae60; }

    .drag-handle {
      color: #ccc;
      font-size: 1.1rem;
      cursor: grab;
      flex-shrink: 0;
      user-select: none;
    }

    .del-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #ccc;
      font-size: 1.2rem;
      padding: 0 4px;
      line-height: 1;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .del-btn:hover { color: #e74c3c; }

    /* 0件イラスト */
    .empty-state {
      text-align: center;
      padding: 32px 0 16px;
      color: #bbb;
    }

    .empty-state .empty-icon {
      font-size: 3.5rem;
      display: block;
      margin-bottom: 12px;
      animation: float 3s ease-in-out infinite;
    }

    .empty-state p {
      font-size: 0.95rem;
      margin: 4px 0;
    }

    .empty-state .empty-sub {
      font-size: 0.82rem;
      color: #ccc;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>📝 Todo リスト</h1>
    <div class="input-row">
      <input id="todoInput" type="text" placeholder="やることを入力..." />
      <input id="dueDateInput" type="date" />
      <button onclick="addTodo()">追加</button>
    </div>
    <div class="stats-row">
      <div class="stats" id="stats"></div>
      <button class="clear-btn" id="clearBtn" onclick="clearDone()" style="display:none">完了済みを削除</button>
    </div>
    <div class="filter-row">
      <button id="filter-all" class="active" onclick="setFilter('all')">すべて</button>
      <button id="filter-active" onclick="setFilter('active')">未完了</button>
      <button id="filter-done" onclick="setFilter('done')">完了済み</button>
    </div>
    <ul id="todoList"></ul>
  </div>

  <script>
    let currentFilter = 'all';
    let allTodos = [];
    let dragSrcId = null;

    async function fetchTodos() {
      const res = await fetch("/api/todos");
      const data = await res.json();
      allTodos = data.todos;
      renderTodos();
      updateStats();
    }

    function updateStats() {
      const total = allTodos.length;
      const done = allTodos.filter(t => t.done).length;
      const statsEl = document.getElementById("stats");
      const clearBtn = document.getElementById("clearBtn");

      if (total === 0) {
        statsEl.textContent = '';
        clearBtn.style.display = 'none';
        return;
      }
      statsEl.innerHTML = `<span>${done}</span> / ${total} 件完了`;
      clearBtn.style.display = done > 0 ? 'inline-block' : 'none';
    }

    async function clearDone() {
      const doneTodos = allTodos.filter(t => t.done);
      await Promise.all(doneTodos.map(t =>
        fetch(`/api/todos/${t.id}`, { method: 'DELETE' })
      ));
      fetchTodos();
    }

    function formatDueDate(dateStr) {
      if (!dateStr) return null;
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const due = new Date(dateStr);
      const diff = Math.floor((due - today) / (1000 * 60 * 60 * 24));
      const label = due.toLocaleDateString('ja-JP', { month: 'numeric', day: 'numeric' });
      if (diff < 0)  return { label: `⚠ ${label} 期限切れ`, cls: 'overdue' };
      if (diff === 0) return { label: `🔥 今日が期限`, cls: 'soon' };
      if (diff <= 3)  return { label: `⏰ ${label} まで${diff}日`, cls: 'soon' };
      return { label: `📅 ${label}`, cls: 'ok' };
    }

    function setFilter(filter) {
      currentFilter = filter;
      document.querySelectorAll('.filter-row button').forEach(btn => btn.classList.remove('active'));
      document.getElementById('filter-' + filter).classList.add('active');
      renderTodos();
    }

    function renderTodos() {
      const list = document.getElementById("todoList");
      list.innerHTML = "";

      const filtered = allTodos.filter(todo => {
        if (currentFilter === 'active') return !todo.done;
        if (currentFilter === 'done') return todo.done;
        return true;
      });

      if (filtered.length === 0) {
        const emptyMessages = {
          all:    { icon: '🎉', msg: 'Todoがありません', sub: '上の入力欄からタスクを追加しよう！' },
          active: { icon: '✅', msg: 'すべて完了しています！', sub: 'お疲れさまでした' },
          done:   { icon: '📭', msg: '完了済みのTodoがありません', sub: 'タスクをこなすと、ここに表示されます' },
        };
        const e = emptyMessages[currentFilter];
        list.innerHTML = `
          <div class="empty-state">
            <span class="empty-icon">${e.icon}</span>
            <p>${e.msg}</p>
            <p class="empty-sub">${e.sub}</p>
          </div>
        `;
        return;
      }

      filtered.forEach(todo => {
        const li = document.createElement("li");
        li.dataset.id = todo.id;
        if (todo.done) li.classList.add("done");

        const due = formatDueDate(todo.dueDate);
        const dueDateHTML = due ? `<div class="due-date ${due.cls}">${due.label}</div>` : '';

        li.innerHTML = `
          <span class="drag-handle" title="ドラッグして並び替え">⠿</span>
          <input type="checkbox" ${todo.done ? "checked" : ""} onchange="toggleTodo(${todo.id}, this.checked)" />
          <div class="todo-body">
            <span class="todo-text" title="クリックして編集" ondblclick="startEdit(${todo.id}, this)">${todo.text}</span>
            ${dueDateHTML}
          </div>
          <button class="del-btn" onclick="deleteTodo(${todo.id})" title="削除">✕</button>
        `;

        // ドラッグ&ドロップ
        li.draggable = true;
        li.addEventListener('dragstart', (e) => {
          dragSrcId = todo.id;
          li.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
        });
        li.addEventListener('dragend', () => {
          li.classList.remove('dragging');
          document.querySelectorAll('li.drag-over').forEach(el => el.classList.remove('drag-over'));
        });
        li.addEventListener('dragover', (e) => {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          document.querySelectorAll('li.drag-over').forEach(el => el.classList.remove('drag-over'));
          li.classList.add('drag-over');
        });
        li.addEventListener('drop', async (e) => {
          e.preventDefault();
          li.classList.remove('drag-over');
          if (dragSrcId === todo.id) return;
          const srcIndex = allTodos.findIndex(t => t.id === dragSrcId);
          const dstIndex = allTodos.findIndex(t => t.id === todo.id);
          if (srcIndex === -1 || dstIndex === -1) return;
          const reordered = [...allTodos];
          const [moved] = reordered.splice(srcIndex, 1);
          reordered.splice(dstIndex, 0, moved);
          allTodos = reordered;
          renderTodos();
          updateStats();
          await fetch('/api/todos/reorder', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ orderedIds: reordered.map(t => t.id) })
          });
          fetchTodos();
        });

        list.appendChild(li);
      });
    }

    function startEdit(id, el) {
      const currentText = el.textContent;
      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'todo-edit-input';
      input.value = currentText;
      el.replaceWith(input);
      input.focus();
      input.select();

      async function save() {
        const newText = input.value.trim();
        if (newText && newText !== currentText) {
          await fetch(`/api/todos/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: newText })
          });
          fetchTodos();
        } else {
          // 変更なしor空ならもとに戻す
          const span = document.createElement('span');
          span.className = 'todo-text';
          span.title = 'クリックして編集';
          span.textContent = currentText;
          span.ondblclick = () => startEdit(id, span);
          input.replaceWith(span);
        }
      }

      input.addEventListener('blur', save);
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
        if (e.key === 'Escape') {
          input.removeEventListener('blur', save);
          const span = document.createElement('span');
          span.className = 'todo-text';
          span.title = 'クリックして編集';
          span.textContent = currentText;
          span.ondblclick = () => startEdit(id, span);
          input.replaceWith(span);
        }
      });
    }

    async function addTodo() {
      const input = document.getElementById("todoInput");
      const dueDateInput = document.getElementById("dueDateInput");
      const text = input.value.trim();
      if (!text) return;
      await fetch("/api/todos", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text, dueDate: dueDateInput.value || null })
      });
      input.value = "";
      dueDateInput.value = "";
      fetchTodos();
    }

    async function toggleTodo(id, done) {
      await fetch(`/api/todos/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ done })
      });
      fetchTodos();
    }

    async function deleteTodo(id) {
      await fetch(`/api/todos/${id}`, { method: "DELETE" });
      fetchTodos();
    }

    document.getElementById("todoInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter") addTodo();
    });

    fetchTodos();
  </script>
</body>
</html>
