<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo アプリ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 32px;
      width: 100%;
      max-width: 560px;
    }

    h1 {
      font-size: 1.6rem;
      margin: 0 0 24px;
      color: #1a1a2e;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      font-size: 1rem;
      border: 2px solid #ddd;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #4f8ef7;
    }

    .input-row button {
      padding: 10px 18px;
      font-size: 1rem;
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-row button:hover {
      background: #3a7ae8;
    }

    .filter-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filter-row button {
      padding: 6px 16px;
      font-size: 0.9rem;
      border: 2px solid #ddd;
      border-radius: 20px;
      background: #fff;
      cursor: pointer;
      transition: all 0.2s;
      color: #555;
    }

    .filter-row button.active {
      background: #4f8ef7;
      border-color: #4f8ef7;
      color: #fff;
    }

    .filter-row button:hover:not(.active) {
      border-color: #4f8ef7;
      color: #4f8ef7;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 8px;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.15s;
      border-radius: 6px;
    }

    li:hover {
      background: #f8f9ff;
    }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #4f8ef7;
    }

    li span {
      flex: 1;
      font-size: 1rem;
      color: #333;
    }

    li.done span {
      text-decoration: line-through;
      color: #aaa;
    }

    .del-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #ccc;
      font-size: 1.2rem;
      padding: 0 4px;
      line-height: 1;
      transition: color 0.2s;
    }

    .del-btn:hover {
      color: #e74c3c;
    }

    .empty-msg {
      text-align: center;
      color: #bbb;
      font-size: 0.95rem;
      padding: 24px 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>📝 Todo リスト</h1>
    <div class="input-row">
      <input id="todoInput" type="text" placeholder="やることを入力..." />
      <button onclick="addTodo()">追加</button>
    </div>
    <div class="filter-row">
      <button id="filter-all" class="active" onclick="setFilter('all')">すべて</button>
      <button id="filter-active" onclick="setFilter('active')">未完了</button>
      <button id="filter-done" onclick="setFilter('done')">完了済み</button>
    </div>
    <ul id="todoList"></ul>
  </div>

  <script>
    let currentFilter = 'all';
    let allTodos = [];

    async function fetchTodos() {
      const res = await fetch("/api/todos");
      const data = await res.json();
      allTodos = data.todos;
      renderTodos();
    }

    function setFilter(filter) {
      currentFilter = filter;
      document.querySelectorAll('.filter-row button').forEach(btn => btn.classList.remove('active'));
      document.getElementById('filter-' + filter).classList.add('active');
      renderTodos();
    }

    function renderTodos() {
      const list = document.getElementById("todoList");
      list.innerHTML = "";

      const filtered = allTodos.filter(todo => {
        if (currentFilter === 'active') return !todo.done;
        if (currentFilter === 'done') return todo.done;
        return true;
      });

      if (filtered.length === 0) {
        list.innerHTML = '<p class="empty-msg">Todoがありません</p>';
        return;
      }

      filtered.forEach(todo => {
        const li = document.createElement("li");
        if (todo.done) li.classList.add("done");
        li.innerHTML = `
          <input type="checkbox" ${todo.done ? "checked" : ""} onchange="toggleTodo(${todo.id}, this.checked)" />
          <span>${todo.text}</span>
          <button class="del-btn" onclick="deleteTodo(${todo.id})" title="削除">✕</button>
        `;
        list.appendChild(li);
      });
    }

    async function addTodo() {
      const input = document.getElementById("todoInput");
      const text = input.value.trim();
      if (!text) return;
      await fetch("/api/todos", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text })
      });
      input.value = "";
      fetchTodos();
    }

    async function toggleTodo(id, done) {
      await fetch(`/api/todos/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ done })
      });
      fetchTodos();
    }

    async function deleteTodo(id) {
      await fetch(`/api/todos/${id}`, { method: "DELETE" });
      fetchTodos();
    }

    // Enterキー対応
    document.getElementById("todoInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter") addTodo();
    });

    fetchTodos();
  </script>
</body>
</html>
